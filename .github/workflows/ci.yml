name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run unit tests in the test container
        run: bash ./bin/run-unit-tests.sh

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install requests

      - name: Build integration image and run containerized smoke tests
        env:
          DISCOVERY_HOST: keycloak
        run: bash ./bin/run-integration-tests.sh
